<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2330;
    --border: #2a3045;
    --green: #22c55e;
    --green-dim: #16a34a;
    --yellow: #eab308;
    --red: #ef4444;
    --white: #f0f2f7;
    --muted: #6b7280;
    --accent: #38bdf8;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .app { max-width: 480px; margin: 0 auto; padding: 16px 16px 40px; min-height: 100vh; }

  /* ── Header ── */
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
  .logo { font-family: var(--font-display); font-size:16px; font-weight:900; color:var(--white); letter-spacing:-0.5px; line-height:1.1; }
  .logo small { display:block; font-size:10px; font-weight:500; color:var(--muted); letter-spacing:1px; text-transform:uppercase; font-family:var(--font-body); }
  .logo span { color:var(--accent); }
  .hospital-banner {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 16px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .hospital-banner img { height: 36px; width: auto; display:block; }
  .lang-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--white); border-radius: 8px; padding: 6px 14px;
    font-family: var(--font-body); font-size: 13px; font-weight:500;
    cursor:pointer; transition: background .15s;
  }
  .lang-btn:hover { background: var(--border); }
  .kofi-btn {
    background: transparent; border: 1px solid #2a3045;
    border-radius: 8px; padding: 6px 10px;
    font-size: 18px; cursor: pointer;
    text-decoration: none; display:inline-flex;
    align-items:center; transition: background .15s, transform .1s;
    line-height:1;
  }
  .kofi-btn:hover { background: rgba(255,199,0,.12); border-color:#ffc700; transform: scale(1.1); }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-family: var(--font-display);
    font-size:13px; font-weight:700;
    text-transform:uppercase; letter-spacing:1.5px;
    color: var(--muted); margin-bottom:16px;
  }

  /* ── Form ── */
  .field { margin-bottom: 14px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:500; }
  .field input, .field select {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    color:var(--white); border-radius:var(--radius-sm);
    padding:12px 14px; font-size:16px; font-family:var(--font-body);
    outline:none; transition: border-color .2s;
    -webkit-appearance:none; appearance:none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* ── Buttons ── */
  .btn {
    display:block; width:100%; padding:18px;
    border:none; border-radius:var(--radius);
    font-family:var(--font-display); font-size:17px; font-weight:800;
    letter-spacing:0.5px; cursor:pointer;
    transition: transform .1s, opacity .15s, box-shadow .2s;
    text-align:center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary   { background:var(--accent); color:#0a0f1a; }
  .btn-green     { background:var(--green); color:#0a1a0d; }
  .btn-danger    { background:var(--red); color:#fff; }
  .btn-neutral   { background:var(--surface2); color:var(--white); border:1px solid var(--border); }
  .btn-outline   { background:transparent; color:var(--white); border:1.5px solid var(--border); }
  .btn:hover     { opacity:.9; box-shadow: 0 4px 20px rgba(56,189,248,.15); }
  .btn-row       { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .btn-row3      { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .btn-sm        { padding:12px; font-size:14px; border-radius:10px; }

  /* ── CCF Display ── */
  .ccf-hero {
    text-align:center; padding:28px 20px 20px;
    border-radius:var(--radius); margin:16px 0;
    border: 2px solid var(--border);
    position: relative; overflow: hidden;
  }
  .ccf-hero::before {
    content:''; position:absolute; inset:0;
    opacity:.07; border-radius: var(--radius);
  }
  .ccf-hero.good  { border-color:var(--green); background: rgba(34,197,94,.08); }
  .ccf-hero.good::before  { background:var(--green); }
  .ccf-hero.warn  { border-color:var(--yellow); background: rgba(234,179,8,.08); }
  .ccf-hero.warn::before  { background:var(--yellow); }
  .ccf-hero.bad   { border-color:var(--red); background: rgba(239,68,68,.08); }
  .ccf-hero.bad::before   { background:var(--red); }
  .ccf-number {
    font-family:var(--font-display); font-size:88px; font-weight:900;
    line-height:1; letter-spacing:-4px;
  }
  .ccf-hero.good .ccf-number  { color:var(--green); }
  .ccf-hero.warn .ccf-number  { color:var(--yellow); }
  .ccf-hero.bad  .ccf-number  { color:var(--red); }
  .ccf-label { font-size:14px; color:var(--muted); margin-top:4px; font-weight:500; }
  .ccf-result { font-family:var(--font-display); font-size:18px; font-weight:800; margin-top:6px; }
  .ccf-hero.good .ccf-result  { color:var(--green); }
  .ccf-hero.warn .ccf-result  { color:var(--yellow); }
  .ccf-hero.bad  .ccf-result  { color:var(--red); }

  /* ── Metrics row ── */
  .metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:14px; }
  .metric {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:var(--radius-sm); padding:12px 8px; text-align:center;
  }
  .metric-val { font-family:var(--font-mono); font-size:20px; font-weight:500; color:var(--white); }
  .metric-lbl { font-size:11px; color:var(--muted); margin-top:3px; }

  /* ── Phase badge ── */
  .phase-badge {
    text-align:center; font-family:var(--font-display); font-size:14px;
    font-weight:800; letter-spacing:1px; padding:10px;
    border-radius:var(--radius-sm); margin-bottom:14px;
  }
  .phase-run   { background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.3); }
  .phase-pause { background:rgba(239,68,68,.15); color:var(--red); border:1px solid rgba(239,68,68,.3); }

  /* ── Pause counter ── */
  .pause-info { text-align:center; font-size:13px; color:var(--muted); margin-top:12px; }
  .pause-info b { color:var(--white); }

  /* ── Divider ── */
  .divider { border:none; border-top:1px solid var(--border); margin:18px 0; }

  /* ── Table ── */
  .tbl-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { font-family:var(--font-mono); font-size:11px; color:var(--muted);
       text-transform:uppercase; padding:8px 6px; text-align:left;
       border-bottom:1px solid var(--border); }
  td { padding:9px 6px; border-bottom:1px solid rgba(42,48,69,.6); }
  tr:last-child td { border-bottom:none; }
  .td-comp { color:var(--green); font-weight:600; }
  .td-pause { color:var(--red); font-weight:600; }

  /* ── Canvas ── */
  .chart-wrap { position:relative; height:220px; }
  .chart-wrap-sm { position:relative; height:120px; margin-top:8px; }

  /* ── QR ── */
  #qr-section { text-align:center; padding:16px 0; }
  #qr-section p { font-size:13px; color:var(--muted); margin-top:10px; }
  #qr-canvas-wrap { display:inline-block; background:#fff; padding:12px; border-radius:12px; margin-top:10px; }
  #qr-canvas-wrap canvas, #qr-canvas-wrap img { display:block; }

  /* ── Info caption ── */
  .hint { font-size:12px; color:var(--muted); line-height:1.6; }
  .hint b { color:var(--accent); }

  /* ── Section title ── */
  .section-title {
    font-family:var(--font-display); font-size:14px; font-weight:800;
    color:var(--muted); text-transform:uppercase; letter-spacing:1.5px;
    margin-bottom:12px;
  }

  /* ── Page transitions ── */
  .page { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* ── Error ── */
  .error-msg { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3);
               color:var(--red); border-radius:10px; padding:10px 14px; font-size:14px; margin-bottom:12px; }

  /* ── Target legend ── */
  .target-legend { font-size:12px; text-align:center; color:var(--muted); margin-top:6px; }

  /* ── Install banner ── */
  #install-banner {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
    background: linear-gradient(135deg, #1e2330, #161a23);
    border-top: 1px solid #38bdf8;
    padding: 14px 20px;
    align-items: center; justify-content: space-between;
    gap: 12px; max-width: 480px; margin: 0 auto;
  }
  #install-banner p { font-size:13px; color:#f0f2f7; margin:0; line-height:1.4; }
  #install-banner p span { color:#38bdf8; font-weight:700; }
  #install-banner button {
    background:#38bdf8; color:#0a0f1a; border:none;
    border-radius:10px; padding:10px 18px;
    font-weight:800; font-size:14px; cursor:pointer;
    white-space:nowrap; font-family:'Syne',sans-serif;
    flex-shrink:0;
  }
  #install-close {
    background:transparent!important; color:#6b7280!important;
    padding:6px!important; font-size:18px!important;
    font-weight:400!important; flex-shrink:0;
  }
</style>
</head>

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
// STATE// STATE
// ═══════════════════════════════════════════════════════════
let state = {
  lang: "pt",
  phase: "setup",       // setup | running | paused | done
  student: "",
  evaluator: "",
  scenario: 0,
  date: today(),
  sessionStart: null,
  sessionEnd: null,
  intervals: [],        // [{type, start, end}]
  currentStart: null,
  currentType: null,    // "compression" | "pause"
  showQR: false,
  preservedEval: "",
  preservedScenario: 0,
  ticker: null,
  // chart instances
  pieChart: null,
  tlChart: null,
};

function today() {
  const d = new Date();
  return d.toISOString().split("T")[0];
}
function fmt(s) {
  s = Math.max(0, Math.floor(s));
  const m = String(Math.floor(s/60)).padStart(2,"0");
  const ss = String(s % 60).padStart(2,"0");
  return `${m}:${ss}`;
}
function ccfClass(ccf) {
  if (ccf >= 80) return "good";
  if (ccf >= 60) return "warn";
  return "bad";
}
function calcStats() {
  let compT = state.intervals
    .filter(iv => iv.type === "compression")
    .reduce((a,iv) => a + (iv.end - iv.start) / 1000, 0);
  const now = Date.now();
  if (state.currentStart !== null && state.currentType === "compression")
    compT += (now - state.currentStart) / 1000;
  let totalT = state.sessionEnd
    ? (state.sessionEnd - state.sessionStart) / 1000
    : (now - state.sessionStart) / 1000;
  const ccf = totalT > 0 ? (compT / totalT * 100) : 0;
  return { ccf: Math.round(ccf * 10)/10, compT, totalT };
}
function closeInterval() {
  if (state.currentStart !== null) {
    state.intervals.push({ type: state.currentType, start: state.currentStart, end: Date.now() });
    state.currentStart = null;
    state.currentType = null;
  }
}
function T() { return LANGS[state.lang]; }

// ═══════════════════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════════════════
function render() {
  const app = document.getElementById("app");
  // Destroy charts before re-render
  if (state.pieChart) { state.pieChart.destroy(); state.pieChart = null; }
  if (state.tlChart)  { state.tlChart.destroy();  state.tlChart  = null; }

  const html = buildPage();
  app.innerHTML = `<div class="page">${html}</div>`;
  bindEvents();

  if (state.phase === "done") {
    renderCharts();
    if (state.showQR) renderQR();
  }
}

  const t = T();

function buildPage() {
  switch(state.phase) {
    case "setup":   return topBar() + pageSetup();
    case "running": return topBar() + pageRunning();
    case "paused":  return topBar() + pagePaused();
    case "done":    return topBar() + pageDone();
  }
}

// ── SETUP ──────────────────────────────────────────────────
function pageSetup() {
  const t = T();
  const scenarios = t.scenarios.map((s,i) =>
    `<option value="${i}" ${i === state.preservedScenario ? "selected" : ""}>${s}</option>`).join("");
  return `
  <div class="card">
    <div class="card-title">${t.appSub}</div>
    <div class="field">
      <label>${t.labelStudent}</label>
      <input type="text" id="inp-student" placeholder="${t.phStudent}" value="${state.preservedEval !== undefined ? '' : ''}"/>
    </div>
    <div class="field">
      <label>${t.labelEval}</label>
      <input type="text" id="inp-eval" placeholder="${t.phEval}" value="${state.preservedEval || ''}"/>
    </div>
    <div class="row2">
      <div class="field">
        <label>${t.labelScenario}</label>
        <select id="inp-scenario">${scenarios}</select>
      </div>
      <div class="field">
        <label>${t.labelDate}</label>
        <input type="date" id="inp-date" value="${state.date}"/>
      </div>
    </div>
    <button class="btn btn-primary" id="btn-start" style="margin-top:8px">${t.btnStart}</button>
  </div>
  <div class="hint">${t.hint}</div>`;
}

// ── RUNNING ────────────────────────────────────────────────
function pageRunning() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const cls = ccfClass(ccf);
  const np = state.intervals.filter(iv => iv.type === "pause").length;
  return `
  <div class="phase-badge phase-run">${t.tagRun}</div>
  <div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px">
    👤 ${state.student} · ${T().scenarios[state.scenario]}
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="m-total">${fmt(totalT)}</div><div class="metric-lbl">${t.mTotal}</div></div>
    <div class="metric"><div class="metric-val" id="m-comp">${fmt(compT)}</div><div class="metric-lbl">${t.mComp}</div></div>
    <div class="metric"><div class="metric-val" id="m-fcc">${ccf.toFixed(0)}%</div><div class="metric-lbl">${t.mFCC}</div></div>
  </div>
  <div class="ccf-hero ${cls}" id="ccf-hero">
    <div class="ccf-number" id="ccf-num">${ccf.toFixed(0)}%</div>
    <div class="ccf-label">${t.fccLabel}</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-neutral" id="btn-pause">${t.btnPause}</button>
    <button class="btn btn-danger"  id="btn-stop">${t.btnStop}</button>
  </div>
  <div class="pause-info">${t.nPauses}: <b>${np}</b></div>`;
}

// ── PAUSED ─────────────────────────────────────────────────
function pagePaused() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const cls = ccfClass(ccf);
  const pauseNow = state.currentStart ? (Date.now() - state.currentStart)/1000 : 0;
  const np = state.intervals.filter(iv => iv.type === "pause").length + 1;
  return `
  <div class="phase-badge phase-pause">${t.tagPause}</div>
  <div style="text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px">
    👤 ${state.student} · ${T().scenarios[state.scenario]}
  </div>
  <div class="metrics">
    <div class="metric"><div class="metric-val" id="m-total">${fmt(totalT)}</div><div class="metric-lbl">${t.mTotal}</div></div>
    <div class="metric"><div class="metric-val" id="m-comp">${fmt(pauseNow)}</div><div class="metric-lbl">${t.mPause}</div></div>
    <div class="metric"><div class="metric-val" id="m-fcc">${ccf.toFixed(0)}%</div><div class="metric-lbl">${t.mFCC}</div></div>
  </div>
  <div class="ccf-hero ${cls}" id="ccf-hero">
    <div class="ccf-number" id="ccf-num">${ccf.toFixed(0)}%</div>
    <div class="ccf-label">${t.fccLabel}</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-green"   id="btn-resume">${t.btnResume}</button>
    <button class="btn btn-neutral" id="btn-stop">${t.btnStop}</button>
  </div>
  <div class="pause-info">${t.nPauses}: <b>${np}</b></div>`;
}

// ── DONE ───────────────────────────────────────────────────
function pageDone() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const pauseT = totalT - compT;
  const cls = ccfClass(ccf);
  const resultLbl = ccf >= 60 ? t.approved : t.improve;

  // Table rows
  const rows = state.intervals.map((iv,i) => {
    const dur = (iv.end - iv.start)/1000;
    const isC = iv.type === "compression";
    return `<tr>
      <td>${i+1}</td>
      <td class="${isC ? 'td-comp':'td-pause'}">${isC ? t.tComp : t.tPause}</td>
      <td>${fmt(dur)}</td>
      <td>${dur.toFixed(1)}</td>
      <td>${((iv.start - state.sessionStart)/1000).toFixed(1)}</td>
      <td>${((iv.end   - state.sessionStart)/1000).toFixed(1)}</td>
    </tr>`;
  }).join("");

  const qrSection = state.showQR ? `
    <div id="qr-section">
      <div class="section-title">${t.qrTitle}</div>
      <p>${t.qrCaption}</p>
      <div id="qr-canvas-wrap"></div>
      <button class="btn btn-outline btn-sm" id="btn-qr-dl" style="margin-top:12px">${t.btnQRDl}</button>
    </div>` : "";

  return `
  <div class="card-title" style="font-size:16px;font-family:var(--font-display);font-weight:800;color:var(--white);margin-bottom:4px">${t.resultTitle}</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:14px">
    👤 ${state.student} · ${T().scenarios[state.scenario]} · ${state.date}
  </div>

  <div class="ccf-hero ${cls}">
    <div class="ccf-number">${ccf.toFixed(1)}%</div>
    <div class="ccf-result">${resultLbl}</div>
    <div class="target-legend">${t.targetLegend}</div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-val">${fmt(totalT)}</div><div class="metric-lbl">${t.mTotal}</div></div>
    <div class="metric"><div class="metric-val">${fmt(compT)}</div><div class="metric-lbl">${t.mComp}</div></div>
    <div class="metric"><div class="metric-val">${fmt(pauseT)}</div><div class="metric-lbl">${t.mPause}</div></div>
  </div>

  <hr class="divider"/>

  <div class="section-title">${t.chartPie}</div>
  <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>

  <div class="section-title" style="margin-top:20px">${t.chartTimeline}</div>
  <div class="chart-wrap-sm"><canvas id="chart-tl"></canvas></div>

  <hr class="divider"/>

  <div class="section-title">${t.tableTitle}</div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>${t.colN}</th><th>${t.colType}</th><th>${t.colDur}</th>
        <th>${t.colDurS}</th><th>${t.colStart}</th><th>${t.colEnd}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>

  <hr class="divider"/>

  <div class="section-title">${t.exportTitle}</div>
  <div class="btn-row" style="margin-bottom:12px">
    <button class="btn btn-outline btn-sm" id="btn-pdf">${t.btnPDF}</button>
    <button class="btn btn-outline btn-sm ${state.showQR ? 'btn-primary':''}" id="btn-qr-toggle">${t.btnQR}</button>
  </div>

  ${qrSection}

  <hr class="divider"/>
  <div class="btn-row">
    <button class="btn btn-neutral" id="btn-back">${t.btnBack}</button>
    <button class="btn btn-primary"  id="btn-new">${t.btnNew}</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// CHARTS
// ═══════════════════════════════════════════════════════════
function renderCharts() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const pauseT = totalT - compT;

  // Pie
  const pieCtx = document.getElementById("chart-pie");
  if (pieCtx) {
    state.pieChart = new Chart(pieCtx, {
      type: "doughnut",
      data: {
        labels: t.chartLabels,
        datasets: [{
          data: [compT.toFixed(1), pauseT.toFixed(1)],
          backgroundColor: ["#22c55e","#ef4444"],
          borderColor: ["#0d0f14"],
          borderWidth: 3,
          hoverOffset: 8,
        }]
      },
      options: {
        cutout: "62%",
        plugins: {
          legend: { labels: { color:"#9ca3af", font:{ family:"DM Sans", size:13 } } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmt(parseFloat(ctx.raw))} (${(parseFloat(ctx.raw)/totalT*100).toFixed(1)}%)` }},
        },
      },
      plugins: [{
        id: "center",
        beforeDraw(chart) {
          const {width, height, ctx, chartArea} = chart;
          if (!chartArea) return;
          const cx = (chartArea.left + chartArea.right) / 2;
          const cy = (chartArea.top  + chartArea.bottom) / 2;
          ctx.save();
          ctx.font = `900 22px sans-serif`;
          ctx.fillStyle = ccfClass(ccf) === "good" ? "#22c55e" : ccfClass(ccf) === "warn" ? "#eab308" : "#ef4444";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(`${ccf.toFixed(0)}%`, cx, cy);
          ctx.restore();
        }
      }]
    });
  }

  // Timeline (horizontal bar)
  const tlCtx = document.getElementById("chart-tl");
  if (tlCtx && state.intervals.length) {
    const datasets = state.intervals.map((iv, i) => ({
      label: iv.type === "compression" ? t.tComp : t.tPause,
      data: [{ x: (iv.start - state.sessionStart)/1000, y: 0 }],
      backgroundColor: iv.type === "compression" ? "#22c55e" : "#ef4444",
      barThickness: 26,
      base: 0,
    }));

    // Use simpler stacked bar approach
    const labels = [""];
    const compSegs = [], pauseSegs = [];
    state.intervals.forEach(iv => {
      const dur = (iv.end - iv.start)/1000;
      if (iv.type === "compression") compSegs.push(dur);
      else pauseSegs.push(dur);
    });

    // Build proper segments
    const segData = state.intervals.map(iv => ({
      dur: (iv.end - iv.start)/1000,
      start: (iv.start - state.sessionStart)/1000,
      type: iv.type,
    }));

    const tlDatasets = segData.map((seg, i) => ({
      label: i === 0 ? (seg.type === "compression" ? t.tComp : t.tPause) : "",
      data: [seg.dur],
      backgroundColor: seg.type === "compression" ? "#22c55e" : "#ef4444",
      barThickness: 30,
      stack: "tl",
    }));

    state.tlChart = new Chart(tlCtx, {
      type: "bar",
      data: { labels: [""], datasets: tlDatasets },
      options: {
        indexAxis: "y",
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => ` ${fmt(ctx.raw)}` }
        }},
        scales: {
          x: { stacked:true, ticks:{ color:"#6b7280", font:{family:"DM Mono"} },
               grid:{ color:"rgba(42,48,69,.5)" } },
          y: { stacked:true, display:false },
        },
      }
    });
  }
}

// ═══════════════════════════════════════════════════════════
// QR CODE
// ═══════════════════════════════════════════════════════════
function buildQRText() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const pauseT = totalT - compT;
  const np = state.intervals.filter(iv=>iv.type==="pause").length;
  const res = ccf >= 60 ? t.approved.replace("✓ ","") : t.improve.replace("✗ ","");
  return [
    "=== AHA SBV/BLS ===",
    `${t.pdfStudent}: ${state.student}`,
    `${t.pdfEval}: ${state.evaluator || "—"}`,
    `${t.pdfScenario}: ${T().scenarios[state.scenario]}`,
    `${t.pdfDate}: ${state.date}`,
    "---",
    `CCF/FCC: ${ccf.toFixed(1)}%  ->  ${res}`,
    `${t.pdfTotal}: ${fmt(totalT)} (${totalT.toFixed(1)}s)`,
    `${t.pdfComp}: ${fmt(compT)} (${compT.toFixed(1)}s)`,
    `${t.pdfPause}: ${fmt(pauseT)} (${pauseT.toFixed(1)}s)`,
    `${t.pdfNP}: ${np}`,
    "---",
    t.pdfTarget,
  ].join("\n");
}

function renderQR() {
  const wrap = document.getElementById("qr-canvas-wrap");
  if (!wrap) return;
  wrap.innerHTML = "";

  const text = buildQRText();
  const size = 220;

  // Try QRCode library first (qrcodejs)
  try {
    if (typeof QRCode !== "undefined") {
      new QRCode(wrap, {
        text: text,
        width: size, height: size,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M,
      });
      return;
    }
  } catch(e) {}

  // Fallback: draw QR manually via canvas using qrcode-generator
  try {
    if (typeof qrcode !== "undefined") {
      const qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();
      const canvas = document.createElement("canvas");
      const cells = qr.getModuleCount();
      const cellSize = Math.floor(size / cells);
      canvas.width = canvas.height = cells * cellSize;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000000";
      for (let r = 0; r < cells; r++) {
        for (let c = 0; c < cells; c++) {
          if (qr.isDark(r, c)) {
            ctx.fillRect(c * cellSize, r * cellSize, cellSize, cellSize);
          }
        }
      }
      wrap.appendChild(canvas);
      return;
    }
  } catch(e) {}

  // Last fallback: QR via API image
  const img = document.createElement("img");
  const encoded = encodeURIComponent(text);
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encoded}`;
  img.width = size; img.height = size;
  img.style.borderRadius = "8px";
  img.onerror = () => { wrap.innerHTML = `<p style="color:#ef4444;padding:10px">QR unavailable offline</p>`; };
  wrap.appendChild(img);
}

// ═══════════════════════════════════════════════════════════
// CSV EXPORT
// ═══════════════════════════════════════════════════════════
function downloadCSV() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const pauseT = totalT - compT;
  const res = ccf >= 60 ? t.approved.replace("✓ ","") : t.improve.replace("✗ ","");

  let csv = `${t.pdfStudent},${t.pdfEval},${t.pdfScenario},${t.pdfDate},CCF/FCC (%),Resultado,Total (s),Comp (s),Pausa (s)\n`;
  csv += `"${state.student}","${state.evaluator || ''}","${T().scenarios[state.scenario]}","${state.date}",${ccf.toFixed(1)},"${res}",${totalT.toFixed(1)},${compT.toFixed(1)},${pauseT.toFixed(1)}\n\n`;
  csv += `${t.colN},${t.colType},${t.colDurS},${t.colStart},${t.colEnd}\n`;
  state.intervals.forEach((iv,i) => {
    const dur = (iv.end-iv.start)/1000;
    const s   = (iv.start-state.sessionStart)/1000;
    const e   = (iv.end-state.sessionStart)/1000;
    csv += `${i+1},"${iv.type==="compression"?t.tComp:t.tPause}",${dur.toFixed(1)},${s.toFixed(1)},${e.toFixed(1)}\n`;
  });
  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `CCF_${state.student.replace(/ /g,"_")}_${state.date}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════════════════
// PDF EXPORT (text-based via canvas → png → download)
// ═══════════════════════════════════════════════════════════
function downloadPDF() {
  const t = T();
  const { ccf, compT, totalT } = calcStats();
  const pauseT = totalT - compT;
  const np = state.intervals.filter(iv=>iv.type==="pause").length;
  const res = ccf >= 60 ? t.approved.replace("✓ ","APROVADO/APROBADO") : t.improve.replace("✗ ","A MELHORAR/POR MEJORAR");
  const cls = ccfClass(ccf);
  const accentColor = cls==="good" ? "#22c55e" : cls==="warn" ? "#eab308" : "#ef4444";

  const c = document.createElement("canvas");
  c.width = 800; c.height = 1100;
  const ctx = c.getContext("2d");

  // Background
  ctx.fillStyle = "#0d0f14";
  ctx.fillRect(0,0,c.width,c.height);

  // Header bar
  ctx.fillStyle = "#161a23";
  ctx.fillRect(0,0,c.width,70);
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 26px sans-serif";
  ctx.fillText("❤ CCF / FCC · AHA SBV / BLS", 30, 44);

  // Divider
  ctx.strokeStyle = "#2a3045";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30,80); ctx.lineTo(770,80); ctx.stroke();

  // Info fields
  ctx.fillStyle = "#9ca3af"; ctx.font = "14px sans-serif";
  ctx.fillText(`${t.pdfStudent}: `, 30, 110);
  ctx.fillStyle = "#f0f2f7"; ctx.font = "bold 14px sans-serif";
  ctx.fillText(state.student, 140, 110);

  ctx.fillStyle = "#9ca3af"; ctx.font = "14px sans-serif";
  ctx.fillText(`${t.pdfEval}: `, 30, 132);
  ctx.fillStyle = "#f0f2f7"; ctx.font = "bold 14px sans-serif";
  ctx.fillText(state.evaluator || "—", 140, 132);

  ctx.fillStyle = "#9ca3af"; ctx.font = "14px sans-serif";
  ctx.fillText(`${t.pdfScenario}: `, 30, 154);
  ctx.fillStyle = "#f0f2f7"; ctx.font = "bold 14px sans-serif";
  ctx.fillText(T().scenarios[state.scenario], 140, 154);

  ctx.fillStyle = "#9ca3af"; ctx.font = "14px sans-serif";
  ctx.fillText(`${t.pdfDate}: `, 30, 176);
  ctx.fillStyle = "#f0f2f7"; ctx.font = "bold 14px sans-serif";
  ctx.fillText(state.date, 140, 176);

  // CCF Hero box
  ctx.fillStyle = accentColor + "20";
  roundRect(ctx, 30, 200, 740, 130, 16);
  ctx.strokeStyle = accentColor;
  ctx.lineWidth = 2;
  roundRectStroke(ctx, 30, 200, 740, 130, 16);

  ctx.fillStyle = accentColor;
  ctx.font = "bold 72px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`${ccf.toFixed(1)}%`, 400, 275);
  ctx.font = "bold 20px sans-serif";
  ctx.fillText(res, 400, 305);
  ctx.fillStyle = "#6b7280"; ctx.font = "12px sans-serif";
  ctx.fillText(t.pdfTarget, 400, 325);
  ctx.textAlign = "left";

  // Summary
  ctx.fillStyle = "#9ca3af"; ctx.font = "bold 12px sans-serif";
  ctx.fillText("RESUMO / RESUMEN", 30, 368);
  ctx.strokeStyle = "#2a3045"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(30,376); ctx.lineTo(770,376); ctx.stroke();

  const summaryRows = [
    [t.pdfTotal, fmt(totalT) + ` (${totalT.toFixed(1)}s)`],
    [t.pdfComp,  fmt(compT)  + ` (${compT.toFixed(1)}s)`],
    [t.pdfPause, fmt(pauseT) + ` (${pauseT.toFixed(1)}s)`],
    [t.pdfNP,    String(np)],
  ];
  summaryRows.forEach(([label, val], i) => {
    const y = 400 + i*22;
    ctx.fillStyle = "#9ca3af"; ctx.font = "14px sans-serif";
    ctx.fillText(label + ":", 30, y);
    ctx.fillStyle = "#f0f2f7"; ctx.font = "bold 14px sans-serif";
    ctx.fillText(val, 280, y);
  });

  // Table
  ctx.fillStyle = "#9ca3af"; ctx.font = "bold 12px sans-serif";
  ctx.fillText("DETALHE / DETALLE", 30, 500);
  ctx.beginPath(); ctx.moveTo(30,508); ctx.lineTo(770,508); ctx.stroke();

  const cols = [30,60,200,330,470,600];
  const headers = ["N°", t.colType, t.colDurS, t.colStart, t.colEnd];
  ctx.fillStyle = "#6b7280"; ctx.font = "bold 11px sans-serif";
  headers.forEach((h,i) => ctx.fillText(h, cols[i], 526));

  state.intervals.forEach((iv, idx) => {
    const y = 546 + idx*22;
    if (y > 1060) return;
    const dur = (iv.end-iv.start)/1000;
    const s   = (iv.start-state.sessionStart)/1000;
    const e   = (iv.end-state.sessionStart)/1000;
    const isC = iv.type==="compression";
    const rowVals = [String(idx+1), isC ? t.tComp : t.tPause, dur.toFixed(1), s.toFixed(1), e.toFixed(1)];
    rowVals.forEach((v,i) => {
      ctx.fillStyle = i===1 ? (isC ? "#22c55e" : "#ef4444") : "#f0f2f7";
      ctx.font = i===1 ? "bold 13px sans-serif" : "13px sans-serif";
      ctx.fillText(v, cols[i], y);
    });
  });

  // Footer
  ctx.fillStyle = "#2a3045";
  ctx.fillRect(0, 1070, 800, 30);
  ctx.fillStyle = "#6b7280"; ctx.font = "12px sans-serif"; ctx.textAlign="center";
  ctx.fillText(t.pdfFooter, 400, 1090);

  // Download
  c.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `CCF_${state.student.replace(/ /g,"_")}_${state.date}.png`;
    a.click();
  });
}

function roundRect(ctx, x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.fill();
}
function roundRectStroke(ctx, x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath(); ctx.stroke();
}

function downloadQRPNG() {
  const cv  = document.querySelector("#qr-canvas-wrap canvas");
  const img = document.querySelector("#qr-canvas-wrap img");
  let src = null;
  if (cv) {
    src = cv.toDataURL("image/png");
  } else if (img && img.src && !img.src.startsWith("https://api")) {
    src = img.src;
  }
  if (src) {
    const a = document.createElement("a");
    a.href = src;
    a.download = `QR_CCF_${(state.student||"eval").replace(/ /g,"_")}_${state.date}.png`;
    a.click();
  } else if (img) {
    // For API-based QR, open in new tab
    window.open(img.src, "_blank");
  }
}

// ═══════════════════════════════════════════════════════════
// TICK (live update for running/paused)
// ═══════════════════════════════════════════════════════════
function startTicker() {
  stopTicker();
  state.ticker = setInterval(() => {
    if (state.phase !== "running" && state.phase !== "paused") { stopTicker(); return; }
    const { ccf, compT, totalT } = calcStats();
    const pauseNow = (state.currentStart ? (Date.now()-state.currentStart)/1000 : 0);

    const mTotal = document.getElementById("m-total");
    const mComp  = document.getElementById("m-comp");
    const mFcc   = document.getElementById("m-fcc");
    const hero   = document.getElementById("ccf-hero");
    const numEl  = document.getElementById("ccf-num");

    if (mTotal) mTotal.textContent = fmt(totalT);
    if (mComp)  mComp.textContent  = state.phase==="paused" ? fmt(pauseNow) : fmt(compT);
    if (mFcc)   mFcc.textContent   = ccf.toFixed(0)+"%";
    if (hero) {
      hero.className = "ccf-hero " + ccfClass(ccf);
    }
    if (numEl)  numEl.textContent = ccf.toFixed(0)+"%";
  }, 500);
}
function stopTicker() {
  if (state.ticker) { clearInterval(state.ticker); state.ticker = null; }
}

// ═══════════════════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════════════════
function bindEvents() {
  // Language toggle
  const lt = document.getElementById("lang-toggle");
  if (lt) lt.onclick = () => {
    state.lang = LANGS[state.lang].otherLang;
    render();
  };
  // (lang cycles: pt → es → en → pt via otherLang chain)

  // SETUP
  const btnStart = document.getElementById("btn-start");
  if (btnStart) btnStart.onclick = () => {
    const student = document.getElementById("inp-student").value.trim();
    const evaluator = document.getElementById("inp-eval").value.trim();
    const scenario  = parseInt(document.getElementById("inp-scenario").value);
    const date      = document.getElementById("inp-date").value;

    state.student   = student || T().anon;
    state.evaluator = evaluator;
    state.scenario  = scenario;
    state.date      = date;
    state.intervals = [];
    state.sessionStart  = Date.now();
    state.sessionEnd    = null;
    state.currentStart  = Date.now();
    state.currentType   = "compression";
    state.phase         = "running";
    state.showQR        = false;
    render();
    startTicker();
  };

  // RUNNING
  const btnPause = document.getElementById("btn-pause");
  if (btnPause) btnPause.onclick = () => {
    closeInterval();
    state.currentStart = Date.now();
    state.currentType  = "pause";
    state.phase        = "paused";
    render();
    startTicker();
  };

  // PAUSED
  const btnResume = document.getElementById("btn-resume");
  if (btnResume) btnResume.onclick = () => {
    closeInterval();
    state.currentStart = Date.now();
    state.currentType  = "compression";
    state.phase        = "running";
    render();
    startTicker();
  };

  // STOP (both phases)
  const btnStop = document.getElementById("btn-stop");
  if (btnStop) btnStop.onclick = () => {
    closeInterval();
    state.sessionEnd = Date.now();
    state.phase      = "done";
    stopTicker();
    render();
  };

  // DONE — exports
  const btnPDF = document.getElementById("btn-pdf");
  if (btnPDF) btnPDF.onclick = downloadPDF;

  const btnQRToggle = document.getElementById("btn-qr-toggle");
  if (btnQRToggle) btnQRToggle.onclick = () => {
    state.showQR = !state.showQR;
    render();
  };

  const btnQRDl = document.getElementById("btn-qr-dl");
  if (btnQRDl) btnQRDl.onclick = downloadQRPNG;

  // DONE — navigation
  const btnBack = document.getElementById("btn-back");
  if (btnBack) btnBack.onclick = () => {
    // Keep evaluator and scenario for next student
    state.preservedEval     = state.evaluator;
    state.preservedScenario = state.scenario;
    state.student    = "";
    state.intervals  = [];
    state.sessionStart = state.sessionEnd = null;
    state.currentStart = null; state.currentType = null;
    state.phase      = "setup";
    state.showQR     = false;
    render();
  };

  const btnNew = document.getElementById("btn-new");
  if (btnNew) btnNew.onclick = () => {
    state.student = state.evaluator = "";
    state.scenario = 0; state.preservedEval = ""; state.preservedScenario = 0;
    state.intervals = []; state.sessionStart = state.sessionEnd = null;
    state.currentStart = null; state.currentType = null;
    state.phase = "setup"; state.showQR = false;
    render();
  };
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
render();
</script>

<script>
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'flex';
});

window.addEventListener('appinstalled', () => {
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'none';
  deferredPrompt = null;
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}
</script>
